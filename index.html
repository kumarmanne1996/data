<!DOCTYPE html>
<html>
<head>
    <title>GitHub JSON Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">JSON Data Table</h2>

<table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
</table>

<script>
async function loadTable() {
    const url = "https://raw.githubusercontent.com/kumarmanne1996/data/refs/heads/main/list.json"; // <-- paste here

    const response = await fetch(url);
    const data = await response.json();

    if (!Array.isArray(data)) {
        console.error("JSON must be an array of objects");
        return;
    }

    const headers = Object.keys(data[0]);

    // Header
    document.getElementById("thead").innerHTML =
        "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

    // Rows
    document.getElementById("tbody").innerHTML =
        data.map(row =>
            "<tr>" +
            headers.map(h => `<td>${row[h] ?? ""}</td>`).join("") +
            "</tr>"
        ).join("");
}

loadTable();
</script>

</body>
</html>
